version: "3.9"

networks:
  finshield-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  hadoop-data:
  faiss-index:
  spark-checkpoints:
  ollama-models:

services:

  # ── Infrastructure ─────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finshield-zookeeper
    networks: [finshield-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finshield-kafka
    networks: [finshield-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finshield-kafka-setup
    networks: [finshield-net]
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Creating topics...' &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic transactions --partitions 6 --replication-factor 1 --config retention.ms=86400000 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic fraud-alerts --partitions 3 --replication-factor 1 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic device-events --partitions 3 --replication-factor 1 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic merchant-events --partitions 3 --replication-factor 1 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic login-events --partitions 3 --replication-factor 1 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic risk-scores --partitions 3 --replication-factor 1 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic enriched-transactions --partitions 6 --replication-factor 1 &&
        echo 'All topics created successfully.'
      "
    restart: on-failure

  postgres:
    image: postgres:15-alpine
    container_name: finshield-postgres
    networks: [finshield-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: finshield
      POSTGRES_USER: finshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finshield_secure_pass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finshield-redis
    networks: [finshield-net]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: finshield-ollama
    networks: [finshield-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finshield-kafka-ui
    networks: [finshield-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finshield-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Application Services ──────────────────────────────────────────

  transaction-generator:
    build:
      context: ./services/transaction-generator
    container_name: finshield-generator
    networks: [finshield-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRANSACTIONS_PER_SECOND: ${TPS:-50}
      FRAUD_RATE: ${FRAUD_RATE:-0.07}
    restart: unless-stopped

  fraud-detection:
    build:
      context: ./services/fraud-detection
    container_name: finshield-fraud-detector
    networks: [finshield-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql+asyncpg://finshield:${POSTGRES_PASSWORD:-finshield_secure_pass}@postgres:5432/finshield
    restart: unless-stopped

  rag-pipeline:
    build:
      context: ./services/rag-pipeline
    container_name: finshield-rag
    networks: [finshield-net]
    depends_on:
      - ollama
    volumes:
      - faiss-index:/app/faiss_index
    ports:
      - "8001:8001"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-mistral}
    restart: unless-stopped

  api-server:
    build:
      context: ./services/api-server
    container_name: finshield-api
    networks: [finshield-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql+asyncpg://finshield:${POSTGRES_PASSWORD:-finshield_secure_pass}@postgres:5432/finshield
      RAG_SERVICE_URL: http://rag-pipeline:8001
    restart: unless-stopped

  dashboard:
    build:
      context: ./services/dashboard
    container_name: finshield-dashboard
    networks: [finshield-net]
    depends_on:
      - api-server
    ports:
      - "3000:80"
    restart: unless-stopped
